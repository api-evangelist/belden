common:
  - type: Website
    url: https://www.belden.com
  - type: Documentation
    url: https://www.doc.hirschmann.com/
    title: Hirschmann Product Documentation
  - type: Support
    url: https://hirschmann-support.belden.com
    title: Hirschmann Technical Support
  - type: Features
    data:
      - name: Industrial Ethernet Networking
        description: >-
          End-to-end industrial Ethernet infrastructure including managed switches,
          routers, and network access controllers for factory automation, process
          control, and critical infrastructure environments.
      - name: IIoT Connectivity
        description: >-
          IO-Link masters with direct IIoT communication protocols including OPC UA,
          MQTT, CoAP, and REST API for cloud-to-sensor connectivity in Industry 4.0
          deployments.
      - name: Network Management Software
        description: >-
          Industrial HiVision network management system for configuration, monitoring,
          and management of SNMP-enabled devices across multi-vendor industrial networks.
      - name: Cybersecurity Solutions
        description: >-
          Industrial cybersecurity products and solutions including firewalls, intrusion
          detection, and secure remote access for operational technology (OT) networks.
      - name: Signal Transmission
        description: >-
          High-performance cable and connectivity products for broadcast, industrial,
          and enterprise signal transmission applications, including fiber optic and
          copper solutions.
      - name: Single Pair Ethernet
        description: >-
          SPE technology with Time Sensitive Networking (TSN) capability and Power
          over Data Lines (PoDL) for lightweight, low-EMI connectivity to field devices
          with up to 1000-meter reach.
      - name: Hirschmann CLI and SNMP
        description: >-
          Hirschmann industrial switches support command-line interface (CLI), SNMP,
          and REST API management interfaces for programmatic device configuration and
          monitoring via HiOS software.
  - type: UseCases
    data:
      - name: Industrial Automation Networking
        description: >-
          Deploy ruggedized industrial Ethernet infrastructure to connect PLCs, sensors,
          and control systems in manufacturing plants and process facilities.
      - name: IIoT Device Integration
        description: >-
          Connect field-level sensors and actuators to cloud and enterprise systems
          using IO-Link masters with OPC UA, MQTT, and REST API protocols.
      - name: Smart Building Networks
        description: >-
          Build converged network infrastructure for building automation, security,
          lighting, and HVAC control systems using Belden structured cabling and
          active networking products.
      - name: Broadcast Infrastructure
        description: >-
          Deploy broadcast-grade signal distribution and connectivity solutions for
          live production, post-production, and media transport workflows.
      - name: OT Network Security
        description: >-
          Protect operational technology networks with industrial firewalls, secure
          remote access, and network segmentation solutions designed for OT environments.
  - type: Integrations
    data:
      - name: OPC UA
        description: >-
          Belden IO-Link masters and Hirschmann devices support OPC UA for secure,
          platform-independent data exchange between field devices and industrial
          applications.
      - name: MQTT
        description: >-
          MQTT protocol support in Belden IIoT devices for lightweight sensor data
          publishing to cloud platforms and industrial IoT brokers.
      - name: SNMP
        description: >-
          SNMP v1, v2c, and v3 support across Hirschmann industrial switch product
          lines for integration with network management systems and monitoring tools.
